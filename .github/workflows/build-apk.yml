name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3.2.2

      - name: Restore Java 21
        run: |
          echo "JAVA_HOME=$JAVA_HOME_21_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_21_X64/bin" >> $GITHUB_PATH

      - run: npx cap sync android

      - name: Patch AndroidManifest for Waypoint deep link
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Add toriforge:// deep link intent filter if not already present
          if ! grep -q "toriforge" $MANIFEST; then
            sed -i 's|</activity>|        <intent-filter>\n                <action android:name="android.intent.action.VIEW" />\n                <category android:name="android.intent.category.DEFAULT" />\n                <category android:name="android.intent.category.BROWSABLE" />\n                <data android:scheme="toriforge" android:host="callback" />\n            </intent-filter>\n        </activity>|' $MANIFEST
          fi
          echo "Manifest patched"

      - run: chmod +x android/gradlew

      - run: cd android && ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4.6.2
        with:
          name: tori-forge-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
